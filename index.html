                t.gh_ques.toLowerCase().includes(query)
              );
              if (ch.name.toLowerCase().includes(query) || matchedTopics.length > 0) {
                return { ...ch, topics: matchedTopics.length > 0 ? matchedTopics : ch.topics };
              }
              return null;
            }).filter(Boolean);
          }, [searchQuery]);

          const activeChapter = useMemo(() => SYLLABUS_DATA.find(ch => ch.id === selectedChapterId), [selectedChapterId]);
          const totalTopicsCount = useMemo(() => SYLLABUS_DATA.reduce((sum, ch) => sum + ch.topics.length, 0), []);
          const completedTopicsCount = useMemo(() => Object.values(completedTopics).filter(Boolean).length, [completedTopics]);
          const completionPercentage = useMemo(() => totalTopicsCount === 0 ? 0 : Math.round((completedTopicsCount / totalTopicsCount) * 100), [completedTopicsCount, totalTopicsCount]);

          return (
            <div className="min-h-screen bg-slate-950 text-slate-100 font-sans selection:bg-emerald-500 selection:text-slate-950 flex flex-col justify-between">
              
              <div className="fixed inset-0 overflow-hidden pointer-events-none z-0 opacity-25">
                <div className="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-emerald-900/20 blur-[120px]" />
                <div className="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-teal-900/20 blur-[120px]" />
              </div>

              <div className="z-10 w-full">
                
                <header className="sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-800/80">
                  <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
                    <div className="flex items-center gap-3 cursor-pointer" onClick={() => { setSelectedChapterId(null); setExpandedTopicIndex(null); }}>
                      <div className="bg-gradient-to-tr from-emerald-500 to-teal-400 text-slate-950 p-2.5 rounded-xl shadow-lg shadow-emerald-500/10 font-extrabold text-lg tracking-wider">
                        HSC
                      </div>
                      <div>
                        <h1 className="text-lg md:text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-emerald-200 via-teal-100 to-emerald-100">
                          জীববিজ্ঞান ১ম পত্র (Full CQ Masterclass)
                        </h1>
                        <p className="text-xs text-emerald-400/90 font-medium tracking-wide">সকল অধ্যায়ের {totalTopicsCount}টি টপিক অন্তর্ভুক্ত</p>
                      </div>
                    </div>
                    <div className="relative w-full sm:w-72">
                      <span className="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400 pointer-events-none"><SearchIcon /></span>
                      <input type="text" placeholder="টপিক বা প্রশ্ন খুঁজুন..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
                        className="w-full bg-slate-950/80 text-slate-200 placeholder:text-slate-500 text-xs rounded-xl pl-9 pr-4 py-2.5 border border-slate-800 focus:border-emerald-500/50 focus:ring-1 focus:ring-emerald-500/20 focus:outline-none transition-all" />
                      {searchQuery && <button onClick={() => setSearchQuery("")} className="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-slate-300 text-xs">মুছুন</button>}
                    </div>
                  </div>
                </header>

                <main className="max-w-7xl mx-auto px-4 py-8">
                  <div className="mb-8 bg-slate-900/40 rounded-2xl p-5 border border-slate-800/60 flex flex-col md:flex-row items-center justify-between gap-4">
                    <div className="space-y-1">
                      <h2 className="text-sm font-bold text-slate-300">আপনার পূর্ণাঙ্গ প্রস্তুতি ট্র্যাকার</h2>
                      <p className="text-xs text-slate-400">গুরুত্বপূর্ণ সৃজনশীল টপিকসমূহ পড়ার পর ডানদিকের বক্সে টিক দিয়ে সম্পন্ন চিহ্নিত করুন।</p>
                    </div>
                    <div className="flex items-center gap-4 w-full md:w-auto">
                      <div className="w-full md:w-48 bg-slate-950 h-2.5 rounded-full overflow-hidden border border-slate-800">
                        <div className="bg-gradient-to-r from-emerald-500 to-teal-400 h-full rounded-full transition-all duration-500" style={{ width: `${completionPercentage}%` }} />
                      </div>
                      <span className="text-xs font-extrabold text-emerald-400 whitespace-nowrap bg-emerald-500/10 px-3 py-1.5 rounded-lg border border-emerald-500/20">
                        {completionPercentage}% সম্পন্ন ({completedTopicsCount}/{totalTopicsCount})
                      </span>
                    </div>
                  </div>

                  {selectedChapterId === null ? (
                    <div className="space-y-8">
                      <div className="p-6 md:p-8 rounded-3xl bg-gradient-to-br from-slate-900 via-slate-900/90 to-emerald-950/20 border border-slate-800/80 shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-8 opacity-10"><BookOpenIcon /></div>
                        <div className="max-w-2xl space-y-4 relative z-10">
                          <span className="bg-emerald-500/10 text-emerald-400 font-extrabold text-[10px] tracking-wider uppercase px-3 py-1 rounded-full border border-emerald-500/20">
                            সম্পূর্ণ সিলেবাস আনলকড
                          </span>
                          <h2 className="text-2xl md:text-3xl font-black text-slate-100 leading-tight">
                            জীববিজ্ঞান ১ম পত্রে জিপিএ-৫ পাওয়ার মেগা গাইড
                          </h2>
                          <p className="text-xs md:text-sm text-slate-400 leading-relaxed">
                            বোর্ড ও টেস্ট পেপারের আলোকে বাছাইকৃত <strong>১২টি অধ্যায়ের মোট {totalTopicsCount}টি টপিকের</strong> (গ) প্রয়োগমূলক এবং (ঘ) উচ্চতর দক্ষতা প্রশ্ন ও উত্তরের সমাহার। নিচে যেকোনো অধ্যায় নির্বাচন করুন।
                          </p>
                        </div>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        {filteredSyllabus.map((chapter) => {
                          const chapterTopics = chapter.topics;
                          const completedLocal = chapterTopics.filter(t => completedTopics[`${chapter.id}-${t.title}`]).length;
                          const localPercent = chapterTopics.length > 0 ? Math.round((completedLocal / chapterTopics.length) * 100) : 0;

                          return (
                            <div key={chapter.id} onClick={() => { setSelectedChapterId(chapter.id); setExpandedTopicIndex(0); }}
                              className="group cursor-pointer p-5 rounded-2xl bg-slate-900/50 hover:bg-slate-900 border border-slate-800/80 hover:border-emerald-500/30 transition-all duration-300 shadow-sm flex flex-col justify-between gap-4 h-full">
                              <div className="flex items-start gap-4">
                                <div className="w-12 h-12 rounded-xl bg-slate-950 flex items-center justify-center font-black text-lg text-emerald-400 border border-slate-800 group-hover:border-emerald-500/30 transition-all shrink-0">
                                  {chapter.chapterNo}
                                </div>
                                <div>
                                  <h4 className="text-sm font-extrabold text-slate-200 group-hover:text-emerald-300 transition-colors">
                                    {chapter.name}
                                  </h4>
                                  <p className="text-xs text-slate-500 mt-1">{chapter.topics.length}টি টপিক</p>
                                </div>
                              </div>
                              <div className="flex items-center gap-3 w-full">
                                <div className="w-full bg-slate-950 h-1.5 rounded-full overflow-hidden">
                                  <div className="bg-emerald-400 h-full" style={{ width: `${localPercent}%` }} />
                                </div>
                                <span className="text-[10px] font-bold text-slate-400 shrink-0">{localPercent}%</span>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ) : (
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                      
                      {/* Sidebar */}
                      <aside className="lg:col-span-4 space-y-4">
                        <button onClick={() => { setSelectedChapterId(null); setExpandedTopicIndex(null); }}
                          className="w-full flex items-center justify-center gap-2 py-3 px-4 rounded-xl text-xs font-bold bg-slate-900 hover:bg-slate-850 border border-slate-800 hover:border-slate-700 text-slate-300 transition-all">
                          <HomeIcon /> প্রধান সূচিপত্রে ফিরে যান
                        </button>

                        <div className="bg-slate-900/40 rounded-2xl border border-slate-800/80 p-4 space-y-3">
                          <div className="pb-3 border-b border-slate-800/60">
                            <span className="text-[10px] font-bold text-emerald-400 uppercase tracking-widest">অধ্যায় {activeChapter.chapterNo}</span>
                            <h3 className="text-sm font-extrabold text-slate-200 mt-0.5">{activeChapter.name}</h3>
                          </div>

                          <div className="space-y-1.5 max-h-[500px] overflow-y-auto pr-1">
                            {activeChapter.topics.map((topic, idx) => {
                              const isCompleted = completedTopics[`${activeChapter.id}-${topic.title}`];
                              return (
                                <div key={idx} onClick={() => { setExpandedTopicIndex(idx); setExpandedSection(null); }}
                                  className={`w-full text-left p-3 rounded-xl text-xs transition-all cursor-pointer border flex items-center justify-between gap-3 ${
                                    expandedTopicIndex === idx ? 'bg-gradient-to-r from-emerald-950/30 to-slate-900 border-emerald-500/30 text-emerald-300 font-bold'
                                      : 'bg-slate-950/40 hover:bg-slate-900 border-transparent text-slate-400 hover:text-slate-300'
                                  }`}>
                                  <div className="flex items-center gap-2 truncate">
                                    <span className={`w-1.5 h-1.5 rounded-full shrink-0 ${expandedTopicIndex === idx ? 'bg-emerald-400' : 'bg-slate-600'}`} />
                                    <span className="truncate whitespace-normal leading-tight">{topic.title}</span>
                                  </div>
                                  <button onClick={(e) => toggleTopicCompletion(activeChapter.id, topic.title, e)}
                                    className={`w-5 h-5 rounded-md flex items-center justify-center border transition-all shrink-0 ${
                                      isCompleted ? 'bg-emerald-500 border-emerald-400 text-slate-950' : 'border-slate-800 bg-slate-950 hover:border-slate-600 text-transparent'
                                    }`}><CheckIcon /></button>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      </aside>

                      {/* Main View */}
                      <section className="lg:col-span-8 space-y-6">
                        {activeChapter.topics[expandedTopicIndex] ? (
                          <div className="space-y-6 animate-fadeIn">
                            <div className="bg-slate-900/50 rounded-2xl border border-slate-800/80 p-6 space-y-4">
                              <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 pb-4 border-b border-slate-800/60">
                                <div>
                                  <span className="text-[10px] font-black text-emerald-400 uppercase tracking-wider">টপিক {expandedTopicIndex + 1}</span>
                                  <h2 className="text-xl font-extrabold text-slate-100 mt-1">{activeChapter.topics[expandedTopicIndex].title}</h2>
                                </div>
                                <button onClick={(e) => toggleTopicCompletion(activeChapter.id, activeChapter.topics[expandedTopicIndex].title, e)}
                                  className={`py-1.5 px-3.5 rounded-xl text-xs font-bold border transition-all flex items-center gap-1.5 shrink-0 ${
                                    completedTopics[`${activeChapter.id}-${activeChapter.topics[expandedTopicIndex].title}`]
                                      ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' : 'bg-slate-950 border-slate-800 hover:border-slate-700 text-slate-400'
                                  }`}>
                                  <CheckIcon />
                                  {completedTopics[`${activeChapter.id}-${activeChapter.topics[expandedTopicIndex].title}`] ? 'সম্পন্ন' : 'পড়া শেষ করুন'}
                                </button>
                              </div>

                              <div className="p-4 rounded-xl bg-gradient-to-r from-slate-950 to-slate-900 border border-slate-800">
                                <h4 className="text-xs font-black text-amber-400 uppercase tracking-widest flex items-center gap-2 mb-2">
                                  <ShieldAlertIcon /> উদ্দীপক চেনার উপায় (Scenario Clues)
                                </h4>
                                <p className="text-xs text-slate-300 leading-relaxed font-mono">{activeChapter.topics[expandedTopicIndex].scenario}</p>
                              </div>
                            </div>

                            {/* Q (গ) */}
                            <div className="bg-slate-900/50 rounded-2xl border border-slate-800/80 overflow-hidden transition-all">
                              <div onClick={() => setExpandedSection(expandedSection === 'g' ? null : 'g')}
                                className="p-5 flex items-center justify-between gap-4 cursor-pointer hover:bg-slate-900/40">
                                <div className="flex items-start gap-4">
                                  <span className="w-8 h-8 rounded-lg bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 font-black text-sm flex items-center justify-center shrink-0">গ</span>
                                  <div>
                                    <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wide">প্রয়োগমূলক (মান - ৩)</span>
                                    <h4 className="text-sm font-bold text-slate-200 mt-1">{activeChapter.topics[expandedTopicIndex].g_ques}</h4>
                                  </div>
                                </div>
                                <span className="text-slate-500 shrink-0"><EyeIcon /></span>
                              </div>
                              {expandedSection === 'g' && (
                                <div className="p-6 border-t border-slate-800/80 bg-slate-950/60 text-sm leading-relaxed text-slate-300 whitespace-pre-line">
                                  <p className="leading-relaxed text-slate-300 text-xs md:text-sm">{activeChapter.topics[expandedTopicIndex].g_ans}</p>
                                </div>
                              )}
                            </div>

                            {/* Q (ঘ) */}
                            <div className="bg-slate-900/50 rounded-2xl border border-slate-800/80 overflow-hidden transition-all">
                              <div onClick={() => setExpandedSection(expandedSection === 'gh' ? null : 'gh')}
                                className="p-5 flex items-center justify-between gap-4 cursor-pointer hover:bg-slate-900/40">
                                <div className="flex items-start gap-4">
                                  <span className="w-8 h-8 rounded-lg bg-teal-500/10 text-teal-400 border border-teal-500/20 font-black text-sm flex items-center justify-center shrink-0">ঘ</span>
                                  <div>
                                    <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wide">উচ্চতর দক্ষতা (মান - ৪)</span>
                                    <h4 className="text-sm font-bold text-slate-200 mt-1">{activeChapter.topics[expandedTopicIndex].gh_ques}</h4>
                                  </div>
                                </div>
                                <span className="text-slate-500 shrink-0"><EyeIcon /></span>
                              </div>
                              {expandedSection === 'gh' && (
                                <div className="p-6 border-t border-slate-800/80 bg-slate-950/60 text-sm leading-relaxed text-slate-300 whitespace-pre-line">
                                  <p className="leading-relaxed text-slate-300 text-xs md:text-sm">{activeChapter.topics[expandedTopicIndex].gh_ans}</p>
                                </div>
                              )}
                            </div>

                            {/* Draw Tips */}
                            <div className="bg-slate-900/30 rounded-2xl border border-dashed border-slate-850 overflow-hidden transition-all">
                              <div onClick={() => setExpandedSection(expandedSection === 'draw' ? null : 'draw')}
                                className="p-4 flex items-center justify-between gap-4 cursor-pointer hover:bg-slate-900/20">
                                <div className="flex items-center gap-3">
                                  <span className="text-amber-400"><PaintbrushIcon /></span>
                                  <h4 className="text-xs font-extrabold text-slate-300">চিত্র অঙ্কনের টিপস</h4>
                                </div>
                                <span className="text-xs text-slate-500">{expandedSection === 'draw' ? 'বন্ধ করুন' : 'দেখুন'}</span>
                              </div>
                              {expandedSection === 'draw' && (
                                <div className="p-5 border-t border-slate-800 bg-slate-950/40 text-xs text-slate-400">
                                  <p className="text-slate-300 font-mono">{activeChapter.topics[expandedTopicIndex].drawing_tips}</p>
                                </div>
                              )}
                            </div>
                          </div>
                        ) : null}
                      </section>
                    </div>
                  )}
                </main>
              </div>

              <footer className="mt-20 border-t border-slate-900 bg-slate-950 py-10 text-xs text-slate-500 z-10">
                <div className="max-w-7xl mx-auto px-4 text-center">
                  <p>HSC Biology Full Creative Masterclass © All 12 Chapters Integrated.</p>
                </div>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
